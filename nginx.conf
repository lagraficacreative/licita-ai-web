# Bloque que SIRVE la web (default_server: atiende lalicita.ai y cualquier host no redirigido)
server {
    listen 80 default_server;
    server_name lalicita.ai _;

    root /usr/share/nginx/html;
    index index.html;

    # Permite abrir /producto en vez de /producto.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache de estáticos (css)
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Página 404 propia (devuelve estado 404 real, mejor para SEO que servir index)
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Seguridad básica
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
}

# Redirección 301 SOLO del dominio antiguo + www → dominio nuevo canónico (SEO)
server {
    listen 80;
    server_name licita.lagrafica.ai www.licita.lagrafica.ai www.lalicita.ai;
    return 301 https://lalicita.ai$request_uri;
}
